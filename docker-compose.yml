version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: saleor
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: saleor

  redis:
    image: redis:7

  api:
    image: ghcr.io/saleor/saleor:latest
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://saleor:saleor@db:5432/saleor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "secret"
      DEBUG: "True"